name: Poll data
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run RSS poller
        run: python scripts/rss-poller.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run trends poller
        run: python scripts/trends-poller.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Reddit poller
        run: python scripts/reddit-poller.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run YouTube poller
        run: python scripts/youtube-poller.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Run Places poller
        run: python scripts/places-poller.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
