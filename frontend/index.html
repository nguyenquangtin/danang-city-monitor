<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Da Nang City Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07080d;
      --surface:   #0d0f18;
      --surface2:  #131726;
      --border:    #1c2035;
      --border2:   #252a40;
      --primary:   #3b82f6;
      --primary-d: #1d4ed8;
      --green:     #22c55e;
      --red:       #ef4444;
      --orange:    #f97316;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --muted2:    #94a3b8;
      --reddit:    #ff4500;
      --yt:        #ff0000;
      --mono:      'Fira Code', monospace;
      --sans:      'Inter', sans-serif;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    .logo span { color: var(--primary); }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      color: var(--green);
      letter-spacing: 0.08em;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .header-right {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      grid-template-rows: auto;
      gap: 0;
      min-height: calc(100vh - 48px);
    }

    /* ── Sidebar ── */
    aside {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sidebar-section {
      border-bottom: 1px solid var(--border);
      padding: 1rem;
    }

    /* ── Section label ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .section-label svg { flex-shrink: 0; }

    /* ── Digest ── */
    .digest-text {
      font-size: 13px;
      line-height: 1.7;
      color: var(--muted2);
      white-space: pre-wrap;
    }

    .digest-text strong { color: var(--text); }

    /* ── Trend pills ── */
    .trend-list { display: flex; flex-direction: column; gap: 6px; }

    .trend-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: default;
      transition: border-color 200ms;
    }

    .trend-item:hover { border-color: var(--border2); }

    .trend-kw {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .trend-val {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--primary);
      margin-left: 8px;
      flex-shrink: 0;
    }

    /* ── Main content ── */
    main {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .main-section {
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
    }

    /* ── YouTube grid ── */
    .yt-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 8px;
    }

    .yt-card {
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: opacity 200ms;
    }

    .yt-card:hover { opacity: 0.85; }

    .yt-thumb-wrap {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      aspect-ratio: 16/9;
      background: var(--surface2);
    }

    .yt-thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .yt-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      background: rgba(0,0,0,0.4);
      transition: opacity 200ms;
    }

    .yt-card:hover .yt-play { opacity: 1; }

    .yt-play svg { width: 28px; height: 28px; fill: white; }

    .yt-title {
      font-size: 12px;
      font-weight: 500;
      margin-top: 6px;
      line-height: 1.4;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .yt-views {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── Article feed ── */
    .feed { display: flex; flex-direction: column; gap: 0; margin-top: 8px; }

    .feed-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 150ms;
    }

    .feed-item:last-child { border-bottom: none; }
    .feed-item:hover { background: var(--surface2); margin: 0 -1.25rem; padding: 9px 1.25rem; }

    .feed-badge {
      flex-shrink: 0;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 2px 5px;
      border-radius: 3px;
      margin-top: 2px;
    }

    .badge-rss    { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
    .badge-reddit { background: rgba(255,69,0,0.12);   color: #fb923c; border: 1px solid rgba(255,69,0,0.25); }

    .feed-content { flex: 1; min-width: 0; }

    .feed-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      line-height: 1.4;
      display: block;
    }

    .feed-title:hover { color: var(--primary); }

    .feed-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── Empty/loading states ── */
    .empty {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      padding: 8px 0;
    }

    /* ── Skeleton loader ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border2) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      height: 12px;
      margin-bottom: 6px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Places / Hot Spots ── */
    .places-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 8px;
    }

    .place-card {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 200ms, transform 200ms;
    }

    .place-card:hover {
      border-color: var(--border2);
      transform: translateY(-2px);
    }

    .place-photo {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: var(--border);
    }

    .place-photo-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      color: var(--muted);
      font-size: 24px;
    }

    .place-info { padding: 8px; }

    .place-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .place-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .place-rating {
      display: flex;
      align-items: center;
      gap: 3px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: #fbbf24;
    }

    .place-cat {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 1px 5px;
      border-radius: 3px;
    }

    .cat-cafe          { background: rgba(168,85,247,0.15); color: #c084fc; border: 1px solid rgba(168,85,247,0.25); }
    .cat-restaurant    { background: rgba(249,115,22,0.12); color: #fb923c; border: 1px solid rgba(249,115,22,0.25); }
    .cat-photo-spot    { background: rgba(34,197,94,0.12);  color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
    .cat-bar           { background: rgba(239,68,68,0.12);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .cat-hotel         { background: rgba(59,130,246,0.12); color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      aside { border-right: none; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="logo">DA<span>NANG</span>.MONITOR</div>
      <div class="live-badge">
        <div class="live-dot"></div>
        LIVE
      </div>
    </div>
    <div class="header-right" id="clock">--:--:-- UTC+7</div>
  </header>

  <!-- Layout -->
  <div class="layout">

    <!-- Sidebar -->
    <aside>

      <!-- AI Digest -->
      <div class="sidebar-section">
        <div class="section-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          AI Digest
        </div>
        <div class="digest-text" id="digest">
          <div class="skeleton" style="width:90%"></div>
          <div class="skeleton" style="width:75%"></div>
          <div class="skeleton" style="width:85%"></div>
        </div>
      </div>

      <!-- Google Trends -->
      <div class="sidebar-section">
        <div class="section-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
          Google Trends
        </div>
        <div class="trend-list" id="trends">
          <div class="skeleton" style="height:30px"></div>
          <div class="skeleton" style="height:30px"></div>
          <div class="skeleton" style="height:30px"></div>
        </div>
      </div>

    </aside>

    <!-- Main -->
    <main>

      <!-- Hot Spots -->
      <div class="main-section">
        <div class="section-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Hot Spots — Cafes, Check-ins &amp; Photo Spots
        </div>
        <div class="places-grid" id="places">
          <div class="skeleton" style="height:140px;border-radius:8px"></div>
          <div class="skeleton" style="height:140px;border-radius:8px"></div>
          <div class="skeleton" style="height:140px;border-radius:8px"></div>
          <div class="skeleton" style="height:140px;border-radius:8px"></div>
          <div class="skeleton" style="height:140px;border-radius:8px"></div>
          <div class="skeleton" style="height:140px;border-radius:8px"></div>
        </div>
      </div>

      <!-- YouTube -->
      <div class="main-section">
        <div class="section-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58a2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor"/></svg>
          YouTube — Da Nang
        </div>
        <div class="yt-grid" id="youtube">
          <div class="skeleton" style="height:120px;border-radius:6px"></div>
          <div class="skeleton" style="height:120px;border-radius:6px"></div>
          <div class="skeleton" style="height:120px;border-radius:6px"></div>
          <div class="skeleton" style="height:120px;border-radius:6px"></div>
        </div>
      </div>

      <!-- News Feed -->
      <div class="main-section">
        <div class="section-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1" fill="currentColor"/></svg>
          News Feed &amp; Reddit
        </div>
        <div class="feed" id="articles">
          <div class="skeleton"></div>
          <div class="skeleton" style="width:70%"></div>
          <div class="skeleton"></div>
          <div class="skeleton" style="width:85%"></div>
        </div>
      </div>

    </main>
  </div>

  <script>
    const API = 'https://danang-city-monitor-production.up.railway.app'

    // Live clock
    function updateClock() {
      const now = new Date()
      const vn = new Intl.DateTimeFormat('en-GB', {
        timeZone: 'Asia/Ho_Chi_Minh',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      }).format(now)
      document.getElementById('clock').textContent = `${vn} UTC+7`
    }
    updateClock()
    setInterval(updateClock, 1000)

    // Detect source type for badge
    function sourceBadge(source) {
      if (!source) return ''
      const s = source.toLowerCase()
      if (s.includes('reddit')) return `<span class="feed-badge badge-reddit">REDDIT</span>`
      return `<span class="feed-badge badge-rss">RSS</span>`
    }

    // AI Digest
    fetch(API + '/digest')
      .then(r => r.json())
      .then(d => {
        document.getElementById('digest').textContent =
          d?.summary || 'No digest yet — check back after midnight UTC.'
      })

    // Trends
    fetch(API + '/trends')
      .then(r => r.json())
      .then(rows => {
        document.getElementById('trends').innerHTML = rows.length
          ? rows.map(r => `
              <div class="trend-item">
                <span class="trend-kw">${r.keyword}</span>
                <span class="trend-val">${r.value}</span>
              </div>`).join('')
          : '<div class="empty">No trend data yet.</div>'
      })

    // Hot Spots
    fetch(API + '/places')
      .then(r => r.json())
      .then(rows => {
        const catClass = { 'Cafe': 'cat-cafe', 'Restaurant': 'cat-restaurant', 'Photo Spot': 'cat-photo-spot', 'Bar': 'cat-bar', 'Hotel': 'cat-hotel' }
        document.getElementById('places').innerHTML = rows.length
          ? rows.map(p => `
              <a class="place-card" href="${p.maps_url}" target="_blank" rel="noopener">
                ${p.photo_url
                  ? `<img class="place-photo" src="${p.photo_url}" alt="${p.name}" loading="lazy">`
                  : `<div class="place-photo-placeholder">📍</div>`}
                <div class="place-info">
                  <div class="place-name">${p.name}</div>
                  <div class="place-meta">
                    ${p.rating ? `<span class="place-rating"><svg width="10" height="10" viewBox="0 0 24 24" fill="#fbbf24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>${p.rating}</span>` : ''}
                    <span class="place-cat ${catClass[p.category] || 'cat-cafe'}">${p.category}</span>
                  </div>
                </div>
              </a>`).join('')
          : '<div class="empty">No places yet — add GOOGLE_PLACES_API_KEY to GitHub secrets.</div>'
      })

    // YouTube
    fetch(API + '/youtube')
      .then(r => r.json())
      .then(rows => {
        document.getElementById('youtube').innerHTML = rows.length
          ? rows.map(r => `
              <a class="yt-card" href="${r.url}" target="_blank" rel="noopener">
                <div class="yt-thumb-wrap">
                  <img src="${r.thumbnail_url}" alt="${r.title}" loading="lazy">
                  <div class="yt-play">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                  </div>
                </div>
                <div class="yt-title">${r.title}</div>
                <div class="yt-views">${Number(r.view_count).toLocaleString()} views</div>
              </a>`).join('')
          : '<div class="empty">No videos yet — add YOUTUBE_API_KEY to GitHub secrets.</div>'
      })

    // Articles + Reddit
    fetch(API + '/articles')
      .then(r => r.json())
      .then(rows => {
        document.getElementById('articles').innerHTML = rows.length
          ? rows.map(r => {
              const date = new Date(r.published_at)
              const time = date.toLocaleString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh', hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' })
              return `
                <div class="feed-item">
                  ${sourceBadge(r.source)}
                  <div class="feed-content">
                    <a class="feed-title" href="${r.url}" target="_blank" rel="noopener">${r.title}</a>
                    <div class="feed-meta">${r.source} · ${time}</div>
                  </div>
                </div>`
            }).join('')
          : '<div class="empty">No articles yet.</div>'
      })
  </script>
</body>
</html>
